name: AI Macro Analyst Broadcaster

on:
  schedule:
    - cron: '30 0 * * 1'
  workflow_dispatch: 

jobs:
  analyze-and-broadcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas tabulate requests google-genai python-dotenv
          
      - name: Run the Broadcaster
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python notif.py
        
      - name: Commit and Push Regime JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add regime.json
          git commit -m "data: auto-update algorithmic risk parameters" || exit 0
          git push